<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面迷路了 · 树小乐</title>
  <!-- 手写字体 Caveat (来自 Google Fonts) -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (免费版) 用于图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Caveat', cursive;  /* 全局手写风格 */
      background-color: #ecf3e7;
      color: #1d3b1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1rem;
      background-image: repeating-linear-gradient(45deg, rgba(100, 80, 60, 0.02) 0px, rgba(100, 80, 60, 0.02) 2px, transparent 2px, transparent 6px);
    }

    /* 森林背景元素 (与主页一致) */
    .forest-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .forest-bg i {
      position: absolute;
      color: #3f6844;
      opacity: 0.1;
      font-size: clamp(6rem, 20vw, 18rem);
      transform: rotate(10deg);
    }

    .forest-bg i:nth-child(1) {
      bottom: 0;
      left: -3rem;
      font-size: 22rem;
      opacity: 0.08;
      transform: rotate(5deg);
      color: #2b4b2b;
    }

    .forest-bg i:nth-child(2) {
      top: -2rem;
      right: -2rem;
      font-size: 15rem;
      opacity: 0.09;
      transform: rotate(105deg);
      color: #3f6844;
    }

    .forest-bg i:nth-child(3) {
      top: 30%;
      left: 5%;
      font-size: 8rem;
      opacity: 0.06;
      transform: rotate(45deg);
      color: #5b8c5a;
    }

    /* 404 主卡片 (小而精致) */
    .notfound-card {
      position: relative;
      z-index: 2;
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 60px 60px 40px 40px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 40px -15px #2b462b, 0 0 0 1px #c5ddb5 inset;
      text-align: center;
      border: 2px solid #b1dba3;
    }

    /* 大树图标 */
    .tree-icon {
      font-size: 6rem;
      color: #578e4e;
      filter: drop-shadow(0 8px 10px #3f684480);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 8rem;
      font-weight: 700;
      line-height: 1;
      color: #1d471d;
      text-shadow: 4px 4px 0 #a8d194;
      margin-bottom: 0.5rem;
      letter-spacing: 5px;
    }

    .message {
      font-size: 2rem;
      font-weight: 500;
      color: #2a4b27;
      margin-bottom: 1.5rem;
      border-bottom: 3px dashed #87b07d;
      padding-bottom: 0.8rem;
      display: inline-block;
    }

    .description {
      font-size: 1.5rem;
      color: #3d6637;
      margin-bottom: 2.5rem;
      background: #e5f0de;
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      border-left: 8px solid #5d914f;
      display: inline-block;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: #578e4e;
      color: #f9fff5;
      font-size: 1.8rem;
      font-weight: 500;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 0 #2b4e24, 0 10px 20px -5px #3f6844;
      transition: all 0.1s ease;
      border: 2px solid #b1dba3;
      margin-top: 1rem;
    }

    .btn-home:hover {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #2b4e24, 0 12px 20px -5px #3f6844;
      background: #608a55;
    }

    .btn-home i {
      font-size: 2rem;
    }

    .footer-note {
      margin-top: 2.5rem;
      font-size: 1.3rem;
      color: #4b7047;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .footer-note i {
      color: #578e4e;
    }

    /* 响应式 */
    @media (max-width: 500px) {
      .notfound-card {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 5rem;
      }
      .message {
        font-size: 1.8rem;
      }
      .description {
        font-size: 1.3rem;
      }
      .btn-home {
        font-size: 1.5rem;
        padding: 0.6rem 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- 森林背景 -->
  <div class="forest-bg">
    <i class="fas fa-tree"></i>
    <i class="fas fa-leaf"></i>
    <i class="fas fa-seedling"></i>
  </div>

  <main class="notfound-card">
    <!-- 大树图标 -->
    <div class="tree-icon">
      <i class="fas fa-tree"></i>
    </div>

    <!-- 404 数字 (手写感) -->
    <h1>404</h1>

    <!-- 说明文字 -->
    <div class="description">
      这片森林里没有你要找的叶子
    </div>

    <!-- 返回主页按钮 (指向树.top) -->
    <a href="/" class="btn-home">
      <i class="fas fa-arrow-left"></i> 回到树.top
    </a>

    <!-- 小彩蛋 / 寄语 -->
    <div class="footer-note">
      <i class="fas fa-seedling"></i>
      <span>种一棵树最好的时间是现在</span>
      <i class="fas fa-seedling"></i>
    </div>
  </main>
</body>
</html>
