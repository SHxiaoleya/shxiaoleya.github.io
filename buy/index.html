<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>树.top · 一口价115元出售</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f3e6 0%, #d4e3d1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      margin: 0;
    }

    .card {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      background-color: #ffffffec;
      border-radius: 2.5rem 2.5rem 2rem 2rem;
      box-shadow: 0 30px 50px -10px rgba(40, 60, 30, 0.25), 0 10px 20px -5px rgba(0, 30, 0, 0.15);
      overflow: hidden;
      border: 1px solid #ffffffaa;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.01);
    }

    .leaf-decoration {
      height: 10px;
      background: repeating-linear-gradient(45deg, #5f8b4b 0px, #5f8b4b 12px, #7dab67 12px, #7dab67 24px);
    }

    .content {
      padding: 2rem 2rem 2.5rem;
    }

    .domain-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .tree-emoji {
      font-size: 2.8rem;
      line-height: 1;
      filter: drop-shadow(2px 4px 4px rgba(60, 80, 30, 0.2));
    }

    .domain-name {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1d3b1a;
      line-height: 1.1;
      word-break: keep-all;
      text-shadow: 2px 2px 0 #e5f0db;
    }

    .domain-name small {
      font-size: 1.4rem;
      font-weight: 500;
      color: #3a6230;
      margin-left: 0.2rem;
    }

    .badge {
      background-color: #2e5e2a;
      color: #f1fae6;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      display: inline-block;
      margin: 0.8rem 0 1.2rem 0;
      border: 1px solid #c0dfb3;
      box-shadow: inset 0 1px 3px #b3dba5;
      letter-spacing: 0.4px;
    }

    .price-tag {
      background: #f5ffe7;
      border-radius: 60px;
      padding: 0.8rem 1.8rem;
      display: inline-flex;
      align-items: baseline;
      gap: 0.3rem;
      border: 2px solid #3f7840;
      box-shadow: 0 8px 0 #1f3f1c;
      margin: 0.5rem 0 2rem 0;
    }

    .price-symbol {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1d4d1a;
    }

    .price-number {
      font-size: 4.2rem;
      font-weight: 900;
      line-height: 1;
      color: #194d13;
      letter-spacing: -2px;
    }

    .price-unit {
      font-size: 1.6rem;
      font-weight: 500;
      color: #2c6127;
      margin-left: 0.2rem;
    }

    .features {
      list-style: none;
      margin: 2.2rem 0 2.5rem 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.2rem;
    }

    .features li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.1rem;
      color: #1e3c1b;
      background: #e1f0dbe0;
      padding: 0.75rem 1rem;
      border-radius: 40px;
      border: 1px solid #a9ce9c;
      box-shadow: 0 3px 0 #7b9f6e;
    }

    .features li span {
      font-size: 1.5rem;
    }

    .action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 2rem 0 1.2rem;
    }

    .btn {
      flex: 1 1 180px;
      border: none;
      background: none;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 1rem 0.5rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      border: 2px solid transparent;
      text-decoration: none;
      text-align: center;
    }

    .btn-copy {
      background-color: #ffffff;
      border-color: #507e4a;
      color: #1f4a1a;
      box-shadow: 0 5px 0 #b3cfaa;
    }

    .btn-copy:hover {
      background-color: #eefbe6;
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #a0ba96;
    }

    .btn-copy:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #9bb592;
    }

    .btn-buy {
      background-color: #f5ac33;
      background-image: linear-gradient(145deg, #fbb03b, #f59f1e);
      border-color: #b16200;
      color: #2e4413;
      box-shadow: 0 5px 0 #9e601a;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .btn-buy:hover {
      background-image: linear-gradient(145deg, #ffbc4a, #ffa62b);
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #b4681a;
    }

    .btn-buy:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #9b5419;
    }

    .instruction {
      background: #d8e8d2;
      border-radius: 32px;
      padding: 1.2rem 1.5rem;
      margin: 1.8rem 0 1rem;
      border-left: 8px solid #226622;
      color: #153312;
      font-size: 1rem;
      line-height: 1.6;
      box-shadow: inset 0 1px 4px #fffcf0, 0 4px 0 #688f5e;
    }

    .instruction strong {
      background: #256725;
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-right: 0.4rem;
      display: inline-block;
    }

    .instruction .domain-highlight {
      background-color: #f9f2cf;
      color: #1d441d;
      font-weight: 700;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      border: 1px dashed #226622;
      margin: 0 0.2rem;
      white-space: nowrap;
    }

    .footnote {
      font-size: 0.9rem;
      color: #466a3e;
      text-align: center;
      margin-top: 2.2rem;
      border-top: 2px dotted #afcfaa;
      padding-top: 1.2rem;
    }

    .footnote a {
      color: #1f5420;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px dotted currentColor;
    }

    /* 手机优化 */
    @media (max-width: 450px) {
      .content {
        padding: 1.5rem 1.2rem 2rem;
      }
      .domain-name {
        font-size: 2.4rem;
      }
      .tree-emoji {
        font-size: 2.2rem;
      }
      .price-number {
        font-size: 3.4rem;
      }
      .features {
        grid-template-columns: 1fr;
        gap: 0.8rem;
      }
      .btn {
        font-size: 1.1rem;
        padding: 0.9rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="leaf-decoration"></div>
    <div class="content">
      <!-- 域名的显眼展示 -->
      <div class="domain-header">
        <span class="tree-emoji">🌳</span>
        <h1 class="domain-name">树.top<small>·中文.top</small></h1>
      </div>
      <div class="badge">⚡ 卖家直售 · 阿里云一口价 ⚡</div>

      <!-- 价格突出显示 115元 -->
      <div class="price-tag">
        <span class="price-symbol">¥</span>
        <span class="price-number">115</span>
        <span class="price-unit">元</span>
      </div>

      <!-- 简短卖点，增加吸引力 -->
      <ul class="features">
        <li><span>🌱</span> 单字中文·过目不忘</li>
        <li><span>🔝</span> .top后缀·全球通用</li>
        <li><span>🧠</span> 极简好记·品牌优选</li>
        <li><span>🤝</span> 阿里云交易·安全过户</li>
      </ul>

      <!-- 主要操作按钮组：复制 + 跳转阿里云 -->
      <div class="action-group">
        <button class="btn btn-copy" id="copyDomainBtn">
          <span>📋</span> 复制域名
        </button>
        <a href="https://mi.aliyun.com/domain-detail?domain=%E6%A0%91.top" target="_blank" rel="noopener noreferrer" class="btn btn-buy">
          <span>🛒</span> 前往阿里云购买
        </a>
      </div>

      <!-- 信任提示和补充说明 -->
      <div class="footnote">
        ⛓️ 域名已上架阿里云一口价 · 价格115元固定 <br>
        <span style="opacity:0.7;">🌲 本次交易由阿里云提供担保，安全可靠</span>
      </div>
    </div> <!-- end content -->
    <div class="leaf-decoration" style="transform: rotate(180deg);"></div>
  </div>

  <script>
    (function() {
      const copyBtn = document.getElementById('copyDomainBtn');
      const domainText = '树.top';   // 需要复制的域名

      if (copyBtn) {
        copyBtn.addEventListener('click', function(event) {
          event.preventDefault(); // 防止任何可能的默认行为

          // 使用现代 Clipboard API
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(domainText).then(() => {
              alert('✅ 复制成功！');
            }).catch(err => {
              console.warn('剪贴板写入失败: ', err);
              // 降级方案：提示用户手动复制
              prompt('❌ 自动复制未成功，请手动复制域名（已为您填好）:', domainText);
            });
          } else {
            // 老旧浏览器 fallback
            prompt('请手动复制下方域名:', domainText);
          }
        });
      }

      // 额外：点击前往阿里云按钮时，可以增加一个友好提醒（但不强制）
      const buyLink = document.querySelector('.btn-buy');
      if (buyLink) {
        buyLink.addEventListener('click', function(e) {
          // 仅仅给一个小提示（非阻塞，不影响跳转）
          setTimeout(() => {
            // 无操作，仅保留用户跳转
          }, 50);
        });
      }
    })();
  </script>

  <!-- 完全兼容手机/电脑，无外部依赖，绿色环保 -->
</body>
</html>
